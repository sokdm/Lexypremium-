{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12">
    <div class="text-center">
        <div class="w-32 h-32 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-exclamation-triangle text-red-500 text-5xl"></i>
        </div>
        <h1 class="font-serif text-6xl font-bold text-gray-900 mb-4">500</h1>
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Server Error</h2>
        <p class="text-gray-600 mb-8 max-w-md mx-auto">Something went wrong on our end. Please try again later.</p>
        <a href="{{ url_for('index') }}" class="inline-flex items-center px-8 py-3 bg-brand-600 text-white rounded-full font-semibold hover:bg-brand-700 transition-colors">
            <i class="fas fa-home mr-2"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}
